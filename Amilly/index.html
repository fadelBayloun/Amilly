<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <title>Amilly</title>
</head>

<body>

    <div class="Menu">
        <h1><a href="#1">Nuts</a></h1>
        <h1><a href="#2">Chocolate</a></h1>
        <h1><a href="#3">jellies</a></h1>
        <h1><a href="#4">Contact Us</a></h1>
        <h1>
            <a><img src="https://img.icons8.com/material-outlined/24/a52a2a/instagram-new--v1.png" /></a>
            <a><img src="https://img.icons8.com/material-outlined/24/a52a2a/whatsapp--v1.png" /></a>
            <a><img src="https://img.icons8.com/material-outlined/24/a52a2a/facebook-circled--v5.png" /></a>
        </h1>
    </div>
    <div class="Burger">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <div class="Content">
        <header>
            <h1 class="logo"><img src="images/AMILLY.png" width=50%" alt="Amilly"></h1>
        </header>
        <div class="slideshow-container">

            <!-- Full-width images with number and caption text -->
            <div class="mySlides fade">
                <div class="numbertext">1|3</div>
                <img src="images/chocbg.jpg" style="width:100%">
                <div class="text">Chocolate</div>
            </div>

            <div class="mySlides fade">
                <div class="numbertext">2|3</div>
                <img src="images/chocbg.jpg" style="width:100%">
                <div class="text">Nuts</div>
            </div>

            <div class="mySlides fade">
                <div class="numbertext">3|3</div>
                <img src="images/chocbg.jpg" style="width:100%">
                <div class="text">Jelly</div>
            </div>

            <!-- Next and previous buttons -->
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
        <br>
        <!-- The dots/circles -->
        <div class="dots" style="text-align:center">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>


        <!-- Nuts Section -->
        <div class="container-text" id="1">
            <h2><img class="titles" src="images/NUTS.png" width="70%" alt="nuts"></h2>
        </div>
        <div class="Container" id="Nuts">
            <div id="nutImages">
                <img class="slideDown50" src="images/corn.png" />
                <img class="slideDown50" src="images/krikri.png" />
                <img class="slideDown50" src="images/sunflower.png" />
            </div>
        </div>

        <!-- Chocolate Section -->
        <div class="container-text" id="2">
            <h2><img class="titles" src="images/CHOCOLATE.png" width="100%" alt="chocolate"></h2>
        </div>
        <div class="Container" id="Chocolate">
            <div class="top">
                <img class="left" src="images/choclateBucket.png">
                <img class="left" src="images/choclateBucketSmall.png">
                <img class="left" src="images/peanut.png">
            </div>
            <div class=" bottom">
                <img class="right" src="images/peanutBucket.png">
                <img class="right" src="images/peanutBucketSmall.png">
                <img class="right" src="images/nutella.png">
            </div>
        </div>

        <!-- Jellies Section -->
        <div class="container-text" id="3">
            <h2><img class="titles" src="images/JELLIES.png" width="70%" alt="jellies"></h2>
        </div>
        <div class="Container" id="Jellies">
            <div id="jellyImages">
                <img class="rotate" src="images/jellyGreen.PNG" />
                <img class="rotate" src="images/jellyYellow.PNG" />
                <img class="rotate" src="images/jellyBlue.png" />
                <img class="rotate" src="images/jellyRed.PNG" />
            </div>
        </div>

        <footer id="4">
            <fieldset>
                <legend>
                    <h1>Hit Us Up!</h1>
                </legend>

                <form>
                    <div>
                        <p>Name: &nbsp;</p><input id="name"></input>
                    </div>
                    <div>
                        <p>Phone: &nbsp;</p><input id="phone"></input>
                    </div>
                    <div>
                        <p>Message: &nbsp;</p><Textarea id="Message" rows="10" a></Textarea>
                    </div>
                </form>
                <button><a id="email"
                        href="mailto:test@example.com?subject=Testing out mailto!&body=This is only a test!">
                        Send
                    </a></button>
            </fieldset>
            <br>
            <h1>
                <a><img src="https://img.icons8.com/material-outlined/50/f5deb3/instagram-new--v1.png" /></a>
                <a><img src="https://img.icons8.com/material-outlined/50/f5deb3/whatsapp--v1.png" /></a>
                <a><img src="https://img.icons8.com/material-outlined/50/f5deb3/facebook-circled--v5.png" /></a>
            </h1>
        </footer>
    </div>
</body>

</html>
